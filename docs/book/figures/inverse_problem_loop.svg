<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-label="Inverse problem loop">
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" fill="#111827">Inverse Problem Loop</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="70" y="110" width="130" height="54" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="103" y="142">model m</text>
    <rect x="260" y="110" width="150" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="296" y="142">forward F(m)</text>
    <rect x="470" y="110" width="150" height="54" rx="6" fill="#fee2e2" stroke="#dc2626"/>
    <text x="500" y="142">residual r</text>
    <rect x="300" y="210" width="150" height="54" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="333" y="242">adjoint grad</text>
    <path d="M200 137 H260" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M410 137 H470" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M545 164 C520 225, 460 238, 450 237" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M300 237 C185 232, 132 190, 132 164" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
