<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-label="Acoustic wave energy flow">
  <rect width="760" height="260" fill="#f7fafc"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" fill="#1f2937">Acoustic Energy Flow</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#1f2937">
    <rect x="42" y="92" width="150" height="64" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="72" y="128">pressure p</text>
    <rect x="304" y="92" width="150" height="64" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="324" y="128">velocity u</text>
    <rect x="566" y="92" width="150" height="64" rx="6" fill="#fee2e2" stroke="#dc2626"/>
    <text x="596" y="128">intensity I</text>
    <path d="M192 124 H304" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M454 124 H566" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="218" y="108">impedance</text>
    <text x="480" y="108">power flux</text>
    <text x="75" y="205">I = &lt;p u&gt; = &lt;p^2&gt; / (rho c)</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
