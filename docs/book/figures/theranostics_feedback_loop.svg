    <path d="M518 75 C616 91 670 118 670 153" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M670 207 C650 254 572 285 518 285" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M382 285 C307 278 230 235 230 207" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M230 153 C238 99 317 75 382 75" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="450" y="176" text-anchor="middle" font-size="20">closed-loop</text>
    <text x="450" y="204" text-anchor="middle" font-size="15">diagnose -> treat -> verify</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
