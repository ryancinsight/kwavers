<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="Theranostic feedback loop">
  <rect width="900" height="360" fill="#f9fafb"/>
  <g font-family="Arial" fill="#111827">
    <circle cx="450" cy="180" r="118" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="382" y="48" width="136" height="54" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="450" y="81" text-anchor="middle" font-size="16">Image State</text>
    <rect x="595" y="153" width="150" height="54" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="670" y="186" text-anchor="middle" font-size="16">Register</text>
    <rect x="382" y="258" width="136" height="54" rx="8" fill="#ffedd5" stroke="#f97316"/>
    <text x="450" y="291" text-anchor="middle" font-size="16">Predict Dose</text>
    <rect x="155" y="153" width="150" height="54" rx="8" fill="#fee2e2" stroke="#dc2626"/>
