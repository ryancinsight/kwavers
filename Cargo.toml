[workspace]
members = ["kwavers", "xtask", "pykwavers", "gaia"]
resolver = "2"

[workspace.dependencies]
# Required so Cargo can parse ritk-io/Cargo.toml (which inherits from its own workspace).
ritk-core = { path = "ritk/crates/ritk-core" }
ritk-dicom = { path = "ritk/crates/ritk-dicom" }
ritk-codecs = { path = "ritk/crates/ritk-codecs" }
ritk-nifti = { path = "ritk/crates/ritk-nifti" }
ritk-nrrd = { path = "ritk/crates/ritk-nrrd" }
ritk-metaimage = { path = "ritk/crates/ritk-metaimage" }
ritk-mgh = { path = "ritk/crates/ritk-mgh" }
ritk-analyze = { path = "ritk/crates/ritk-analyze" }
ritk-png = { path = "ritk/crates/ritk-png" }
ritk-jpeg = { path = "ritk/crates/ritk-jpeg" }
ritk-tiff = { path = "ritk/crates/ritk-tiff" }
ritk-minc = { path = "ritk/crates/ritk-minc" }
ritk-vtk = { path = "ritk/crates/ritk-vtk" }
ritk-io = { path = "ritk/crates/ritk-io" }
ritk-model = { path = "ritk/crates/ritk-model" }
ritk-registration = { path = "ritk/crates/ritk-registration" }
burn = { version = "0.19", features = ["wgpu", "autodiff"] }
burn-ndarray = "0.19"
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }
numpy = "0.22"
nalgebra = { version = "0.33", features = ["serde-serialize"] }
dicom = "0.8.0"
nifti = "0.17.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytemuck = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.9"
ndarray = { version = "0.16", features = ["rayon"] }
gaia = { path = "gaia", default-features = false }
tempfile = "3.10"
proptest = "1.0"
tokio = { version = "1.0", features = ["full"] }
walkdir = "2.4"
charls = { version = "0.4", features = ["static"] }
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.11", features = ["blocking", "stream", "json"] }
flate2 = "1.0"
tar = "0.4"
zip = "0.6"
indicatif = "0.17"
dirs = "5.0"
sha2 = "0.10"
hex = "0.4"
image = "0.24"
jpeg-decoder = "0.3.2"
tiff = "0.9"
onnx-ir = "0.20.1"
openjpeg-sys = "1.0"
openjp2 = { version = "0.6.1", default-features = false, features = ["std"] }
jpeg2k = { version = "0.10.1", default-features = false, features = ["openjp2"] }
dicom-core = "0.8"
dicom-ul = "0.8"
dicom-pixeldata = { version = "0.8", features = ["native"] }
dicom-transfer-syntax-registry = { version = "0.8", features = ["native", "jpegxl", "charls", "openjp2"] }
consus-hdf5 = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
consus-core = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
consus-compression = { git = "https://github.com/ryancinsight/consus", features = ["std", "deflate"] }
consus-io = { git = "https://github.com/ryancinsight/consus", features = ["std"] }
# Required so Cargo can parse apollo-fft/Cargo.toml (workspace-inherited deps).
# rustfft pinned to apollo's workspace version (apollo/Cargo.toml). Kwavers
# source code uses apollo, not rustfft; this declaration exists only because
# apollo-fft's bench harness inherits rustfft via `workspace = true`.
rand = "0.9"
criterion = "0.5"
rustfft = "6.4.1"

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)'] }

[profile.dev]
# opt-level = 1: basic dead-code elimination, inlining, and loop optimisation.
# Keeps debug symbols and unoptimised codegen units while making FFT-heavy test
# kernels (PSTD phase-velocity, KZK conservation) ~5–10× faster than opt-level=0.
opt-level = 1

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true  # Strip symbols for smaller Python wheels
