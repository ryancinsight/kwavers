[workspace]
members = ["kwavers", "xtask", "pykwavers"]
resolver = "2"

[workspace.dependencies]
# Required so Cargo can parse ritk-io/Cargo.toml (which inherits from its own workspace).
burn = { version = "0.19", features = ["wgpu", "autodiff"] }
nalgebra = { version = "0.33", features = ["serde-serialize"] }
dicom = "0.8.0"
nifti = "0.17.0"
# Required so Cargo can parse apollo-fft/Cargo.toml (workspace-inherited deps).
rand = "0.8"
criterion = "0.5"

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)'] }

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true  # Strip symbols for smaller Python wheels
