[build]
# Emit AVX2/FMA/AVX-512 for all Zip/par_for_each kernels.
# Without this flag LLVM targets the x86-64 baseline (SSE2 only).
rustflags = ["-C", "target-cpu=native"]

[env]
# Native DICOM codecs (`openjpeg-sys`, `charls-sys`) require a working C/C++
# toolchain. Use Clang and Ninja on the Windows GNU target to avoid the broken
# gcc/MSYS Makefiles path observed in release builds.
CC_x86_64_pc_windows_gnu = { value = "clang", force = false }
CXX_x86_64_pc_windows_gnu = { value = "clang++", force = false }
CC = { value = "clang", force = false }
CXX = { value = "clang++", force = false }
CMAKE_GENERATOR_x86_64_pc_windows_gnu = { value = "Ninja", force = false }

[target.x86_64-pc-windows-gnu]
linker = "clang"
rustflags = [
	"-C", "target-feature=+crt-static",
	"-C", "link-arg=-fuse-ld=lld",
	"-C", "link-arg=-static-libstdc++",
	"-C", "link-arg=-static-libgcc",
]

[alias]
test-fast = "nextest run --profile local --lib --release"
test-timeout = "nextest run --profile ci --lib --release"

# On Windows GNU toolchain, MSYS2 ucrt64 DLLs must be on PATH so that the
# test binary loader can find libstdc++-6.dll.  The api-ms-win-core-winrt-*
# forwarding stub DLL must also be present in target/debug/deps.
# Run tests via:
#   $env:PATH = "D:\msys64\ucrt64\bin;D:\msys64\mingw64\bin;$env:PATH"
#   cargo nextest run --lib
