# chapters.toml — Single source of truth for the kwavers book chapter manifest.
#
# All tooling (generate_all_figures.py, CI pipelines, documentation builders)
# MUST read chapter metadata from this file. Do not duplicate this list elsewhere.
#
# Schema per [[chapter]] entry:
#   number : int    — 1-based chapter number; must be unique and monotonically increasing.
#   script : str    — Filename of the chapter figure script relative to this directory.
#   title  : str    — Human-readable chapter title used in progress output.
#
# SRP: this file changes when the chapter roster changes (add/remove/rename chapters).
# generate_all_figures.py changes only when orchestration logic changes.

