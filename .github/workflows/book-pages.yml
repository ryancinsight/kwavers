name: Deploy mdBook

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/book-pages.yml"
  pull_request:
    paths:
      - "docs/book/**"
      - ".github/workflows/book-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install mdBook
        env:
          MDBOOK_VERSION: "0.5.4"
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            --output mdbook.tar.gz
          tar -xzf mdbook.tar.gz
          echo "$PWD" >> "$GITHUB_PATH"
          mdbook --version

      - name: Build book
        run: |
          mdbook build docs/book
          test -f target/book/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/book

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
