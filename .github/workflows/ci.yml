name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pinn-validation:
    name: PINN Feature Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-pinn-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check PINN feature compilation
        run: cargo check --locked -p kwavers --features pinn --lib

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run PINN tests
        run: cargo nextest run --locked -p kwavers --features pinn --lib

      - name: Run PINN validation framework tests
        run: cargo nextest run --locked -p kwavers --test validation_integration_test

      - name: Run PINN convergence studies
        run: cargo nextest run --locked -p kwavers --test pinn_convergence_studies

      - name: Run clippy on PINN code
        run: cargo clippy --locked -p kwavers --features pinn --lib -- -D warnings
        continue-on-error: true

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy (allowed to fail)
        run: cargo clippy --locked -p kwavers --lib --features="plotting" || true

      - name: Run xtask metrics
        run: cargo run --locked -p xtask -- metrics

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --locked -p kwavers --release --verbose --features="plotting"

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --locked -p kwavers --profile ci --lib --release --verbose --features="plotting"

      - name: Run doc tests
        run: cargo test --locked --doc -p kwavers --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run security audit
        run: cargo deny --config deny.toml --manifest-path crates/kwavers/Cargo.toml check

  memory-safety:
    name: Memory Safety (Miri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup miri
        run: cargo +nightly miri setup

      - name: Run miri on configuration tests
        run: cargo +nightly miri test --locked -p kwavers --lib configuration::builder::tests
        continue-on-error: true # Allow to continue while fixing UB

      - name: Run miri on other safe tests
        run: cargo +nightly miri test --locked -p kwavers --lib --exclude configuration::builder::tests
        continue-on-error: true

  benchmarks:
    name: Benchmark Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-bench-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Execute every plotting-eligible Criterion target once
        run: cargo bench --locked -p kwavers --features plotting --benches -- --test

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    # Exact-head observation: 57 minutes; retain about 20% hosted-runner variance.
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --locked -p kwavers --out xml --features="plotting" --timeout 300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./cobertura.xml
          # Coverage generation above is the reproducible source gate. Codecov
          # ingestion is an external service and may rate-limit tokenless uploads;
          # preserve the report without turning transport failure into a source failure.
          fail_ci_if_error: false

  pinn-convergence:
    name: PINN Convergence Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-pinn-conv-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run convergence studies
        run: cargo nextest run --locked -p kwavers --test pinn_convergence_studies --features pinn

      - name: Run validation integration tests
        run: cargo nextest run --locked -p kwavers --test validation_integration_test

  validation:
    name: Solver Validation Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout Atlas path dependencies
        uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@05b7f5def95e81497321a12c4bd26ef50d723e30
        with:
          manifest: Cargo.toml
          destination: ..
          atlas_ref: 05b7f5def95e81497321a12c4bd26ef50d723e30

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-validation-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: k-Wave analytical comparison tests
        run: cargo nextest run --locked -p kwavers-solver --lib validation::kwave_comparison

      - name: Literature validation tests
        run: cargo nextest run --locked -p kwavers-solver --lib validation::literature

      - name: Numerical accuracy tests
        run: cargo nextest run --locked -p kwavers-solver --lib validation::numerical_accuracy

      - name: Physics benchmarks
        run: cargo nextest run --locked -p kwavers-solver --lib validation::physics_benchmarks

      - name: GPU/CPU equivalence build check
        run: cargo check --locked -p kwavers-gpu --features gpu --lib
