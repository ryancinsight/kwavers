name: benchmark regression

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - .cargo/**
      - crates/**
      - '!crates/kwavers-python/**'
      - .github/workflows/benchmark-regression.yml

permissions:
  contents: read

concurrency:
  group: benchmark-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-smoke:
    name: complete benchmark smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      measurements_required: ${{ steps.artifact_identity.outputs.measurements_required }}
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      PR_BENCH_TARGETS: performance_baseline critical_path_benchmarks simd_field_ops
    steps:
      - name: Checkout baseline
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: kwavers-baseline
          persist-credentials: false

      - name: Checkout candidate
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: kwavers-candidate
          persist-credentials: false

      - name: Checkout Atlas path dependencies
        uses: ./kwavers-candidate/.github/actions/checkout-atlas-path-dependencies
        with:
          manifest: kwavers-candidate/Cargo.toml
          destination: .

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-kwavers-bench-${{ hashFiles('kwavers-candidate/Cargo.lock') }}

      - name: Normalize historical baseline lock
        run: >-
          cargo metadata
          --manifest-path kwavers-baseline/Cargo.toml
          --format-version 1
          --all-features
          > /dev/null

      - name: Hold the candidate benchmark instrument constant
        shell: bash
        run: |
          set -euo pipefail
          rm -rf kwavers-baseline/crates/kwavers/benches
          git -C kwavers-candidate archive HEAD crates/kwavers/benches \
            | tar -x -C kwavers-baseline
          diff --recursive --unified \
            kwavers-baseline/crates/kwavers/benches \
            kwavers-candidate/crates/kwavers/benches

      - name: Execute every benchmark once
        shell: bash
        run: |
          set -euo pipefail
          mv kwavers-candidate kwavers-measurement
          status=0
          cargo bench \
            --manifest-path kwavers-measurement/Cargo.toml \
            --locked \
            --package kwavers \
            --features plotting \
            --benches \
            -- \
            --test || status=$?
          mv kwavers-measurement kwavers-candidate
          exit "$status"

      - name: Compare merge-critical benchmark executables
        id: artifact_identity
        shell: bash
        run: |
          set -euo pipefail
          read -r -a target_names <<< "$PR_BENCH_TARGETS"
          target_args=()
          for target in "${target_names[@]}"; do
            target_args+=(--bench "$target")
          done

          capture_hashes() {
            local revision="$1"
            local output="$2"
            local artifacts="$RUNNER_TEMP/${revision}-artifacts.json"

            if [[ -e kwavers-measurement ]]; then
              echo "::error::measurement path is already occupied"
              return 1
            fi

            mv "$revision" kwavers-measurement
            local status=0
            cargo bench \
              --manifest-path kwavers-measurement/Cargo.toml \
              --locked \
              --package kwavers \
              --features plotting \
              "${target_args[@]}" \
              --no-run \
              --message-format=json > "$artifacts" || status=$?

            if [[ "$status" -eq 0 ]]; then
              jq --raw-output '
                select(
                  .reason == "compiler-artifact"
                  and (.target.kind | index("bench"))
                  and .executable != null
                )
                | [.target.name, .executable]
                | @tsv
              ' "$artifacts" \
                | while IFS=$'\t' read -r name executable; do
                    printf '%s  %s\n' \
                      "$(sha256sum "$executable" | cut -d' ' -f1)" \
                      "$name"
                  done \
                | LC_ALL=C sort > "$output"
            fi

            mv kwavers-measurement "$revision"
            if [[ "$status" -ne 0 ]]; then
              return "$status"
            fi

            if [[ "$(wc -l < "$output")" -ne "${#target_names[@]}" ]]; then
              echo "::error::expected ${#target_names[@]} benchmark executables in $output"
              return 1
            fi
          }

          candidate_hashes="$RUNNER_TEMP/candidate-benchmark-hashes.txt"
          baseline_hashes="$RUNNER_TEMP/baseline-benchmark-hashes.txt"
          capture_hashes kwavers-candidate "$candidate_hashes"
          capture_hashes kwavers-baseline "$baseline_hashes"

          if cmp --silent "$baseline_hashes" "$candidate_hashes"; then
            echo "measurements_required=false" >> "$GITHUB_OUTPUT"
            echo "Merge-critical benchmark executables are byte-identical."
          else
            echo "measurements_required=true" >> "$GITHUB_OUTPUT"
            diff --unified "$baseline_hashes" "$candidate_hashes" || true
          fi

  benchmark-pair:
    name: benchmark pair (${{ matrix.pair_id }})
    needs: benchmark-smoke
    if: needs.benchmark-smoke.outputs.measurements_required == 'true'
    runs-on: ubuntu-24.04
    # The merge-critical instrument must finish within one 30-minute CI lane.
    # Full target execution remains covered by benchmark-smoke above.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - pair_id: first-baseline-first
            report_root: reports/first/baseline-first
            first_revision: kwavers-baseline
            second_revision: kwavers-candidate
          - pair_id: first-candidate-first
            report_root: reports/first/candidate-first
            first_revision: kwavers-candidate
            second_revision: kwavers-baseline
          - pair_id: second-candidate-first
            report_root: reports/second/candidate-first
            first_revision: kwavers-candidate
            second_revision: kwavers-baseline
          - pair_id: second-baseline-first
            report_root: reports/second/baseline-first
            first_revision: kwavers-baseline
            second_revision: kwavers-candidate
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      FIRST_REVISION: ${{ matrix.first_revision }}
      PAIR_ID: ${{ matrix.pair_id }}
      PR_BENCH_TARGETS: performance_baseline critical_path_benchmarks simd_field_ops
      REPORT_ROOT: ${{ matrix.report_root }}
      SECOND_REVISION: ${{ matrix.second_revision }}
    steps:
      - name: Checkout baseline
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: kwavers-baseline
          persist-credentials: false

      - name: Checkout candidate
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: kwavers-candidate
          persist-credentials: false

      - name: Checkout Atlas benchmark gate
        uses: actions/checkout@v7
        with:
          repository: ryancinsight/atlas
          ref: 1393fd8838f3bcd548959a83daa8d9375e3b03d9
          path: atlas-tool
          persist-credentials: false

      - name: Checkout Atlas path dependencies
        uses: ./kwavers-candidate/.github/actions/checkout-atlas-path-dependencies
        with:
          manifest: kwavers-candidate/Cargo.toml
          destination: .

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-kwavers-bench-${{ hashFiles('kwavers-candidate/Cargo.lock') }}

      - name: Normalize historical baseline lock
        run: >-
          cargo metadata
          --manifest-path kwavers-baseline/Cargo.toml
          --format-version 1
          --all-features
          > /dev/null

      - name: Hold the candidate benchmark instrument constant
        shell: bash
        run: |
          set -euo pipefail
          rm -rf kwavers-baseline/crates/kwavers/benches
          git -C kwavers-candidate archive HEAD crates/kwavers/benches \
            | tar -x -C kwavers-baseline
          diff --recursive --unified \
            kwavers-baseline/crates/kwavers/benches \
            kwavers-candidate/crates/kwavers/benches

      - name: Validate complete benchmark registries
        shell: bash
        run: |
          set -euo pipefail

          validate_registry() {
            local revision="$1"

            diff --unified \
              <(
                find "$revision/crates/kwavers/benches" \
                  -maxdepth 1 \
                  -type f \
                  -name '*.rs' \
                  -printf '%f\n' \
                  | sed 's/\.rs$//' \
                  | LC_ALL=C sort
              ) \
              <(
                cargo metadata \
                  --manifest-path "$revision/Cargo.toml" \
                  --locked \
                  --no-deps \
                  --format-version 1 \
                  | jq --raw-output \
                    '.packages[]
                    | select(.name == "kwavers")
                    | .targets[]
                    | select(.kind | index("bench"))
                    | .name' \
                  | LC_ALL=C sort
              )
          }

          validate_registry kwavers-baseline
          validate_registry kwavers-candidate

          if grep --recursive --line-number --extended-regexp \
            'fn[[:space:]]+main[[:space:]]*\(\)[[:space:]]*\{[[:space:]]*\}' \
            kwavers-candidate/crates/kwavers/benches; then
            echo "::error::empty benchmark entry point"
            exit 1
          fi

          for target in $PR_BENCH_TARGETS; do
            if [[ ! -f "kwavers-candidate/crates/kwavers/benches/$target.rs" ]]; then
              echo "::error::missing merge-critical benchmark target: $target"
              exit 1
            fi
          done

      - name: Measure phase-reversed replications
        shell: bash
        run: |
          set -euo pipefail
          gate_manifest="atlas-tool/tools/criterion-regression/Cargo.toml"
          read -r -a target_names <<< "$PR_BENCH_TARGETS"
          target_args=()
          for target in "${target_names[@]}"; do
            target_args+=(--bench "$target")
          done

          run_benches() {
            local revision="$1"
            shift

            if [[ -e kwavers-measurement ]]; then
              echo "::error::measurement path is already occupied"
              return 1
            fi

            mv "$revision" kwavers-measurement
            local status=0
            cargo bench \
              --manifest-path kwavers-measurement/Cargo.toml \
              --locked \
              --package kwavers \
              --features plotting \
              "${target_args[@]}" \
              -- \
              "$@" || status=$?
            mv kwavers-measurement "$revision"
            return "$status"
          }

          rm -rf "$CARGO_TARGET_DIR/criterion"
          run_benches \
            "$FIRST_REVISION" \
            --save-baseline atlas-base

          confidence="$(
            cargo run \
              --manifest-path "$gate_manifest" \
              --locked \
              -- \
              required-confidence \
              --criterion-root "$CARGO_TARGET_DIR/criterion" \
              --baseline atlas-base
          )"

          run_benches \
            "$SECOND_REVISION" \
            --baseline atlas-base \
            --confidence-level "$confidence"

          mkdir -p "$(dirname "$REPORT_ROOT")"
          mv "$CARGO_TARGET_DIR/criterion" "$REPORT_ROOT"
          tar --create --gzip --file "$PAIR_ID.tar.gz" reports

      - name: Upload replicated comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-pair-${{ matrix.pair_id }}
          path: ${{ matrix.pair_id }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  benchmark-regression:
    name: benchmark regression check
    if: always()
    needs:
      - benchmark-smoke
      - benchmark-pair
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MEASUREMENTS_REQUIRED: ${{ needs.benchmark-smoke.outputs.measurements_required }}
    steps:
      - name: Validate benchmark prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.benchmark-smoke.result }}" != "success" ]]; then
            echo "::error::complete benchmark smoke did not pass"
            exit 1
          fi
          if [[ "$MEASUREMENTS_REQUIRED" == "true" \
            && "${{ needs.benchmark-pair.result }}" != "success" ]]; then
            echo "::error::one or more benchmark pairs did not pass"
            exit 1
          fi

      - name: Confirm byte-identical benchmark executables
        if: env.MEASUREMENTS_REQUIRED == 'false'
        run: >-
          echo "Merge-critical base and candidate benchmark executables are
          byte-identical; runtime comparison cannot observe a production-code
          difference."

      - name: Checkout Atlas benchmark gate
        if: env.MEASUREMENTS_REQUIRED == 'true'
        uses: actions/checkout@v7
        with:
          repository: ryancinsight/atlas
          ref: 1393fd8838f3bcd548959a83daa8d9375e3b03d9
          path: atlas-tool
          persist-credentials: false

      - name: Install Rust toolchain
        if: env.MEASUREMENTS_REQUIRED == 'true'
        uses: dtolnay/rust-toolchain@1.97.1

      - name: Download replicated comparisons
        if: env.MEASUREMENTS_REQUIRED == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: benchmark-pair-*
          path: pair-artifacts
          merge-multiple: true

      - name: Restore replicated comparisons
        if: env.MEASUREMENTS_REQUIRED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for archive in pair-artifacts/*.tar.gz; do
            tar --extract --gzip --file "$archive"
          done

      - name: Classify replicated comparisons
        if: env.MEASUREMENTS_REQUIRED == 'true'
        run: >-
          cargo run
          --manifest-path atlas-tool/tools/criterion-regression/Cargo.toml
          --locked
          --
          check-replicated-counterbalanced
          --first-baseline-first-root reports/first/baseline-first
          --first-candidate-first-root reports/first/candidate-first
          --second-baseline-first-root reports/second/baseline-first
          --second-candidate-first-root reports/second/candidate-first
          --baseline atlas-base
