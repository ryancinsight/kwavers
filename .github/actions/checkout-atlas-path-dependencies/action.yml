name: Checkout Atlas path dependencies
description: Materialize the sibling Atlas providers at the coordinated Atlas revisions.

inputs:
  atlas_ref:
    description: Atlas default branch carrying the Kwavers-compatible provider graph.
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Checkout sibling providers
      shell: bash
      run: |
        set -euo pipefail

        workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
        atlas_checkout="$RUNNER_TEMP/atlas"
        git clone --depth 1 --branch "${{ inputs.atlas_ref }}" \
          https://github.com/ryancinsight/atlas.git "$atlas_checkout"
        mapfile -t providers < <(
          sed -nE 's|.*path = "\.\./([^/"]+).*|\1|p' Cargo.toml \
            | grep -v '^kwavers-' \
            | sort -u
        )

        for provider in "${providers[@]}"; do
          destination="$workspace_parent/$provider"
          if [[ -e "$destination" ]]; then
            test -f "$destination/Cargo.toml"
            continue
          fi

          revision="$(git -C "$atlas_checkout" rev-parse "HEAD:repos/$provider")"
          git init --quiet "$destination"
          git -C "$destination" remote add origin "https://github.com/ryancinsight/$provider.git"
          git -C "$destination" fetch --depth 1 origin "$revision"
          git -C "$destination" checkout --detach --quiet FETCH_HEAD
        done
