name: Checkout Atlas path dependencies
description: Materialize the canonical Atlas provider graph for Kwavers CI

inputs:
  manifest:
    description: Cargo manifest relative to GITHUB_WORKSPACE
    required: true
  destination:
    description: Provider parent directory relative to GITHUB_WORKSPACE
    required: true

runs:
  using: composite
  steps:
    - name: Materialize canonical Atlas provider graph
      uses: ryancinsight/atlas/.github/actions/checkout-path-dependencies@b6be8b08d1f3ca984cf63012cf1ce7b9acc55906
      with:
        manifest: ${{ inputs.manifest }}
        destination: ${{ inputs.destination }}
        atlas_ref: b6be8b08d1f3ca984cf63012cf1ce7b9acc55906
