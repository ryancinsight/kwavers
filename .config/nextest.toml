[profile.default]
# Per-test slow-warn at 10 s and forced termination at 60 s (six 10 s windows)
# prevents runaway tests from blocking the lib suite. Global suite cap is 15 min.
# This matches the kwavers standards.yaml policy: "cargo nextest with a strict
# 60-second [per-test] timeout when available".
global-timeout = "15m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "5s" }

[profile.ci]
test-threads = 4
retries = 0
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.local]
test-threads = "num-cpus"
retries = 1
fail-fast = false
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.production]
test-threads = 2
retries = 2
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "5s" }

[profile.diagnostic]
inherits = "local"
retries = 0
fail-fast = false
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "2s" }

[profile.review30]
test-threads = 4
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "5s" }

# heavy: for long-running physics simulation tests (elastic FWI, theranostic
# inverse) that require up to 300 s per test.  Run one test at a time to
# avoid rayon thread-pool oversubscription between parallel test processes.
[profile.heavy]
test-threads = 1
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "60s", terminate-after = 5, grace-period = "10s" }

[test-groups]
integration = { max-threads = 2 }
# Elastic FWI tests run the full PSTD wave equation for each line-search step.
# Even with parallel speculative evaluation the 64×64 liver grid exceeds 60 s.
# 90 s per test is the documented upper bound; see nextest.toml for policy.
elastic-fwi = { max-threads = 1 }

# ── Elastic FWI tests: genuine full-wave physics, 90 s ceiling ──────────────
# These tests run the complete elastic PSTD wave equation for each FWI
# iteration with real grid dimensions (42×42 and 64×64).  The 60 s default is
# insufficient; 90 s is the upper bound after parallel speculative line-search
# optimisation.  max-threads=1 prevents inter-test rayon oversubscription.
[[profile.default.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support)'
test-group = 'elastic-fwi'
slow-timeout = { period = "90s", terminate-after = 1, grace-period = "10s" }

[[profile.ci.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.ci.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support)'
test-group = 'elastic-fwi'
slow-timeout = { period = "90s", terminate-after = 1, grace-period = "10s" }

[[profile.local.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.review30.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'
