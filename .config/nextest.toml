[profile.default]
# Per-test slow-warn at 10 s and forced termination at 60 s (six 10 s windows)
# prevents runaway tests from blocking the lib suite. Global suite cap is 15 min.
# This matches the kwavers standards.yaml policy: "cargo nextest with a strict
# 60-second [per-test] timeout when available".
global-timeout = "15m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "5s" }

[profile.ci]
test-threads = 4
retries = 0
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.local]
test-threads = "num-cpus"
retries = 1
fail-fast = false
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.production]
test-threads = 2
retries = 2
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "5s" }

[profile.diagnostic]
inherits = "local"
retries = 0
fail-fast = false
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "2s" }

[profile.review30]
test-threads = 4
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "5s" }

# heavy: for long-running physics simulation tests (elastic FWI, theranostic
# inverse) that require up to 300 s per test.  Run one test at a time to
# avoid rayon thread-pool oversubscription between parallel test processes.
[profile.heavy]
test-threads = 1
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "60s", terminate-after = 5, grace-period = "10s" }

[test-groups]
integration = { max-threads = 2 }
# Elastic FWI tests run the full PSTD wave equation for each line-search step.
# Even with parallel speculative evaluation the 64×64 liver grid exceeds 60 s.
# 90 s per test is the documented upper bound; see nextest.toml for policy.
elastic-fwi = { max-threads = 1 }
# Heavy full-grid FDTD/PSTD acoustic simulation tests internally parallelise with
# rayon across all 24 cores. Under the default num-cpus test concurrency, N such
# tests run at once × N rayon threads each = severe oversubscription, so each
# crawls and the heaviest cross the 60 s per-test cap purely from contention (they
# finish in ~40 s with adequate cores and pass in release). Capping concurrency to
# 2 gives each ~half the machine, so all finish well inside the *unchanged* 60 s
# cap. This is a scheduler hint — the timeout and every assertion are untouched.
heavy-sim = { max-threads = 2 }
# WGPU device creation and queue polling are serialized on Windows because
# concurrent DX12 adapter contexts can trigger a driver access violation even
# when each test owns an independent Hephaestus device.
gpu = { max-threads = 1 }

# ── Elastic FWI / theranostic integration tests: full-wave physics, 90 s ceiling ─
# These tests run the complete elastic PSTD wave equation + theranostic inverse
# solver over real grid dimensions.  The 60 s default is insufficient; 90 s is
# the upper bound.  max-threads=1 prevents inter-test rayon oversubscription.
[[profile.default.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support) | test(abdominal_preprocessing_keeps_external_skin_between_target_and_aperture) | test(brain_focused_bowl_layout_uses_requested_element_count) | test(recovers_stiff_inclusion) | test(fwi_outperforms_linear_inversion) | test(lbfgs_reconstructs_stiff_inclusion) | test(k_mu_gradient_3d_is_valid_descent_direction)'
test-group = 'elastic-fwi'
slow-timeout = { period = "90s", terminate-after = 1, grace-period = "10s" }

# Heavy full-grid FDTD/PSTD acoustic-simulation binaries → capped concurrency so
# their rayon-parallel solvers do not oversubscribe the CPU (see heavy-sim above).
[[profile.default.overrides]]
filter = 'package(kwavers) & (binary(fdtd_pstd_comparison) | binary(property_based_tests) | binary(session2_source_injection_test) | binary(test_plane_wave_injection_fixed))'
test-group = 'heavy-sim'

[[profile.default.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.ci.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.ci.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.ci.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support) | test(abdominal_preprocessing_keeps_external_skin_between_target_and_aperture) | test(brain_focused_bowl_layout_uses_requested_element_count) | test(recovers_stiff_inclusion) | test(fwi_outperforms_linear_inversion) | test(lbfgs_reconstructs_stiff_inclusion) | test(k_mu_gradient_3d_is_valid_descent_direction)'
test-group = 'elastic-fwi'
slow-timeout = { period = "90s", terminate-after = 1, grace-period = "10s" }

[[profile.local.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.local.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.review30.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.review30.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'
