[profile.default]
# Per-test slow-warn at 10 s and forced termination at 60 s (six 10 s windows)
# prevents runaway tests from blocking the lib suite. Global suite cap is 15 min.
# This matches the kwavers standards.yaml policy: "cargo nextest with a strict
# 60-second [per-test] timeout when available".
global-timeout = "15m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "5s" }

[profile.ci]
test-threads = 4
retries = 0
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.local]
test-threads = "num-cpus"
retries = 1
fail-fast = false
slow-timeout = { period = "10s", terminate-after = 6, grace-period = "10s" }

[profile.production]
test-threads = 2
retries = 2
fail-fast = true
global-timeout = "10m"
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "5s" }

[profile.diagnostic]
inherits = "local"
retries = 0
fail-fast = false
slow-timeout = { period = "5s", terminate-after = 1, grace-period = "2s" }

[profile.review30]
test-threads = 4
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "5s" }

# heavy: for long-running physics simulation tests (elastic FWI, theranostic
# inverse) that require up to 300 s per test.  Run one test at a time to
# avoid rayon thread-pool oversubscription between parallel test processes.
[profile.heavy]
test-threads = 1
retries = 0
fail-fast = false
global-timeout = "30m"
slow-timeout = { period = "60s", terminate-after = 5, grace-period = "10s" }

[test-groups]
integration = { max-threads = 2 }
# Full-grid FWI, theranostic, viscoacoustic, FDTD, and PSTD tests internally
# parallelize through the Moirai or Rayon worker pool. Under default num-cpus
# test concurrency, multiple CPU-saturating processes oversubscribe the same
# cores. Serializing these processes leaves the active solver the whole machine,
# so each stays inside the 30 s performance budget. The timeout and assertions
# are unchanged.
full-grid-sim = { max-threads = 1 }
# WGPU device creation and queue polling are serialized on Windows because
# concurrent DX12 adapter contexts can trigger a driver access violation even
# when each test owns an independent Hephaestus device.
gpu = { max-threads = 1 }

# Full-wave FWI and theranostic tests share the same CPU-saturating group as the
# other full-grid solvers. This preserves the ordinary 30 s performance target
# and 60 s termination contract without cross-group oversubscription.
[[profile.default.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support) | test(abdominal_preprocessing_keeps_external_skin_between_target_and_aperture) | test(brain_focused_bowl_layout_uses_requested_element_count) | test(recovers_stiff_inclusion) | test(fwi_outperforms_linear_inversion) | test(lbfgs_reconstructs_stiff_inclusion) | test(k_mu_gradient_3d_is_valid_descent_direction)'
test-group = 'full-grid-sim'

# Heavy full-grid FDTD/PSTD acoustic-simulation binaries use the same capped
# concurrency so their worker pools do not oversubscribe the CPU.
[[profile.default.overrides]]
filter = 'package(kwavers) & (binary(fdtd_pstd_comparison) | binary(property_based_tests) | binary(session2_source_injection_test) | binary(test_plane_wave_injection_fixed))'
test-group = 'full-grid-sim'

[[profile.default.overrides]]
filter = 'package(kwavers-solver) & test(/forward::viscoacoustic::tests::/)'
test-group = 'full-grid-sim'

[[profile.default.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.ci.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.ci.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.ci.overrides]]
filter = 'test(abdominal_preprocessing_selects_one_connected_treatment_component) | test(abdominal_theranostic_inverse_recovers_lesion_support) | test(abdominal_preprocessing_keeps_external_skin_between_target_and_aperture) | test(brain_focused_bowl_layout_uses_requested_element_count) | test(recovers_stiff_inclusion) | test(fwi_outperforms_linear_inversion) | test(lbfgs_reconstructs_stiff_inclusion) | test(k_mu_gradient_3d_is_valid_descent_direction)'
test-group = 'full-grid-sim'

[[profile.local.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'

[[profile.local.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.review30.overrides]]
filter = 'package(kwavers-gpu)'
test-group = 'gpu'

[[profile.review30.overrides]]
filter = 'test(/integration/)'
test-group = 'integration'
